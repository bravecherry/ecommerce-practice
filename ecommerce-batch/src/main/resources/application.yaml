spring:
  application:
    name: ecommerce-batch
  datasource:
    url: jdbc:postgresql://localhost:5433/postgres?profileSQL=true
    username: postgres
    password: postgrepassword123
    hikari:
      maximum-pool-size: 200
  batch:
    jdbc:
      #      DB 에 batch metadata 없으면 만들고 시작 - 항상
      initialize-schema: always
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 1000
        order_updates: true
        order_inserts: true
logging:
  level:
    root: INFO
    #성능최적화하는데 영향을 줄 수 있어서 로그남지않도록 주석처리
#    org.springframework.jdbc.core.JdbcTemplate: DEBUG
#    org.springframework.jdbc.core.StatementCreatorUtils: DEBUG
